<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#06120a" />
  <title>Your Grove</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-deep:   #06120a;
      --bg-mid:    #0f2418;
      --bg-soft:   #1a4029;
      --accent:    #e8c97a;
      --firefly:   #d8e87a;
      --text:      #ecf2e8;
      --text-dim:  #9ab59d;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
      --tile-size: 140px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: 'Outfit', system-ui, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    body {
      min-height: 100vh;
      padding: calc(20px + var(--safe-top)) 22px calc(40px + var(--safe-bot));
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%,   var(--bg-soft) 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 90% 100%, #1f5235      0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 10% 100%, #0d2818      0%, transparent 60%),
        linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 100%);
      background-attachment: fixed;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1.4px 1.4px at 18% 22%, var(--firefly) 50%, transparent 51%),
        radial-gradient(1px   1px   at 82% 18%, rgba(216,232,122,.7) 50%, transparent 51%),
        radial-gradient(1.2px 1.2px at 62% 70%, var(--firefly) 50%, transparent 51%),
        radial-gradient(1px   1px   at 28% 82%, rgba(216,232,122,.5) 50%, transparent 51%),
        radial-gradient(1.6px 1.6px at 90% 52%, var(--accent) 50%, transparent 51%),
        radial-gradient(1px   1px   at 8%  60%, rgba(232,201,122,.6) 50%, transparent 51%),
        radial-gradient(1.4px 1.4px at 48% 14%, var(--firefly) 50%, transparent 51%),
        radial-gradient(1px   1px   at 74% 88%, rgba(216,232,122,.5) 50%, transparent 51%);
      background-size: 640px 640px;
      opacity: .7;
      pointer-events: none;
      animation: firefly-glow 6s ease-in-out infinite;
      z-index: 0;
    }
    @keyframes firefly-glow {
      0%, 100% { opacity: .45; }
      50%      { opacity: .85; }
    }

    .header { text-align: center; margin-bottom: 38px; position: relative; z-index: 1; }
    .eyebrow {
      font-size: 11px; letter-spacing: .42em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 10px;
    }
    .title {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 400;
      font-size: clamp(34px, 9.5vw, 48px);
      line-height: 1.2; letter-spacing: -.02em;
      background: linear-gradient(180deg, #fff 0%, #c5e0c8 100%);
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
    }
    .title em {
      font-style: italic; color: var(--accent);
      -webkit-text-fill-color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 36px 18px;
      max-width: 480px;
      margin: 0 auto;
      position: relative; z-index: 1;
    }

    .tile {
      display: flex; flex-direction: column; align-items: center;
      text-decoration: none; color: inherit;
      -webkit-tap-highlight-color: transparent;
      opacity: 0;
      animation:
        float  var(--float-dur, 5s) ease-in-out var(--float-delay, 0s) infinite,
        fadeIn .7s ease-out var(--enter-delay, 0s) forwards;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0)    rotate(0deg); }
      50%      { transform: translateY(-7px) rotate(var(--tilt, .6deg)); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .stage {
      width: var(--tile-size);
      height: calc(var(--tile-size) + 22px);
      position: relative; display: flex; justify-content: center;
    }
    .stage::after {
      content: "";
      position: absolute; left: 50%; bottom: 0;
      width: 72%; height: 14px;
      transform: translateX(-50%);
      background: radial-gradient(
        ellipse at center,
        rgba(0,0,0,.55) 0%, rgba(0,0,0,.28) 40%, transparent 72%
      );
      filter: blur(2px);
      animation: groundPulse var(--float-dur, 5s) ease-in-out var(--float-delay, 0s) infinite;
    }
    @keyframes groundPulse {
      0%, 100% { opacity: .85; transform: translateX(-50%) scale(1); }
      50%      { opacity: .55; transform: translateX(-50%) scale(.82); }
    }

    .icon-wrap {
      width: var(--tile-size); height: var(--tile-size);
      position: absolute; top: 0; left: 50%;
      transform: translateX(-50%);
      filter: drop-shadow(0 14px 26px rgba(0,0,0,.5));
      transition: transform .3s cubic-bezier(.34, 1.56, .64, 1);
      overflow: hidden;
      border-radius: 22%;
      background: linear-gradient(135deg, var(--bg-soft), var(--bg-mid));
      display: flex; align-items: center; justify-content: center;
      font-size: 56px;
    }
    .tile:active .icon-wrap { transform: translateX(-50%) scale(.92); }

    .label {
      margin-top: 12px;
      font-family: 'Fraunces', Georgia, serif;
      font-size: 15px;
      color: var(--text);
    }

    @media (prefers-reduced-motion: reduce) {
      .tile, body::before, .stage::after { animation: none !important; }
      .tile { opacity: 1; }
    }
    @media (max-width: 360px) { :root { --tile-size: 120px; } }
  </style>
</head>
<body>
  <header class="header">
    <p class="eyebrow">welcome to</p>
    <h1 class="title">Your <em>grove</em></h1>
  </header>

  <main class="grid" id="grid"></main>

  <script>
    const TILES = [
      { name: "Mossfall",   emoji: "\u{1F33F}", url: "mossfall.html", tilt: "0.7deg",  glow: "rgba(180, 230, 160, .25)" },
      { name: "Ember Pine", emoji: "\u{1F332}", url: "#", tilt: "-0.7deg", glow: "rgba(232, 201, 122, .22)" },
      { name: "Dewfern",    emoji: "\u{1F343}", url: "dewfern.html", tilt: "0.7deg",  glow: "rgba(160, 220, 180, .25)" },
      { name: "Hollow Oak", emoji: "\u{1F333}", url: "#", tilt: "-0.7deg", glow: "rgba(140, 180, 120, .22)" },
      { name: "Glowcap",    emoji: "\u{1F344}", url: "#", tilt: "0.7deg",  glow: "rgba(255, 160, 140, .22)" },
      { name: "Riverbend",  emoji: "\u{1F4A7}", url: "#", tilt: "-0.7deg", glow: "rgba(140, 200, 230, .22)" },
    ];

    function buildTile(t, i) {
      const a = document.createElement("a");
      a.className = "tile";
      a.href = t.url;
      a.setAttribute("aria-label", t.name);
      a.style.setProperty("--float-dur",   (4.6 + (i % 3) * 0.55).toFixed(2) + "s");
      a.style.setProperty("--float-delay", (i * 0.32).toFixed(2) + "s");
      a.style.setProperty("--tilt",        t.tilt);
      a.style.setProperty("--enter-delay", (0.08 + i * 0.09).toFixed(2) + "s");

      const stage = document.createElement("div");
      stage.className = "stage";

      const wrap = document.createElement("div");
      wrap.className = "icon-wrap";
      if (t.glow) wrap.style.boxShadow = `0 0 30px ${t.glow}`;
      wrap.textContent = t.emoji;

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = t.name;

      stage.appendChild(wrap);
      a.appendChild(stage);
      a.appendChild(label);
      return a;
    }

    const grid = document.getElementById("grid");
    TILES.forEach((t, i) => grid.appendChild(buildTile(t, i)));
  </script>
</body>
</html>
